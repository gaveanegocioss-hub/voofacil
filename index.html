<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VooFácil - Google Flights (SerpApi)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; }
    h1, h2 { font-family: 'Playfair Display', serif; }
    .card-hover:hover { transform: translateY(-6px); }
  </style>
</head>
<body class="bg-gradient-to-b from-yellow-50 to-white min-h-screen">
<div class="max-w-7xl mx-auto px-6 py-8">
  <div class="flex items-center gap-3 mb-6">
    <div class="text-5xl">✈️</div>
    <h1 class="text-5xl font-bold text-orange-500">VooFácil</h1>
    <span class="text-sm font-normal text-emerald-600 mt-3">(Google Flights via SerpApi + Proxy)</span>
  </div>

  <div class="bg-yellow-100 border border-yellow-400 text-yellow-800 px-6 py-4 rounded-2xl mb-8 text-sm">
    ⚠️ Usando proxy público para contornar CORS. Pode ser lento ou instável.
  </div>

  <form onsubmit="buscar(event)" class="bg-white shadow-xl rounded-3xl p-8 grid grid-cols-1 md:grid-cols-12 gap-6 mb-12">
    <div class="md:col-span-3">
      <label class="block text-xs font-medium text-gray-500 mb-1">DE ONDE?</label>
      <input id="origin" list="origin-list" type="text" value="GRU" class="w-full px-6 py-5 border-2 border-orange-200 rounded-3xl text-lg focus:border-orange-500 outline-none">
      <datalist id="origin-list"></datalist>
    </div>
    <div class="md:col-span-3">
      <label class="block text-xs font-medium text-gray-500 mb-1">PARA ONDE?</label>
      <input id="destination" list="destination-list" type="text" value="MIA" class="w-full px-6 py-5 border-2 border-orange-200 rounded-3xl text-lg focus:border-orange-500 outline-none">
      <datalist id="destination-list"></datalist>
    </div>
    <div class="md:col-span-2">
      <label class="block text-xs font-medium text-gray-500 mb-1">IDA</label>
      <input type="date" id="departure" value="2026-04-15" class="w-full px-6 py-5 border-2 border-emerald-200 rounded-3xl">
    </div>
    <div class="md:col-span-2">
      <label class="block text-xs font-medium text-gray-500 mb-1">VOLTA</label>
      <input type="date" id="return" value="2026-04-22" class="w-full px-6 py-5 border-2 border-emerald-200 rounded-3xl">
    </div>
    <div class="md:col-span-2 flex items-end">
      <button type="submit" id="search-btn" class="w-full h-14 bg-orange-500 hover:bg-orange-600 text-white font-semibold text-xl rounded-3xl flex items-center justify-center gap-3 transition-all">
        <i class="fa-solid fa-magnifying-glass"></i> BUSCAR
      </button>
    </div>
  </form>

  <div id="header" class="text-3xl font-bold text-orange-600 mb-6"></div>
  <div id="results" class="space-y-8"></div>
</div>

<script>
// === SUA CHAVE ===
const SERPAPI_KEY = "45bede6232b3c0db38487358453cc1acf53da29128464e32258d908b3729e8e4";

const DEFAULT_AIRPORTS = [ /* lista completa mantida */ ];

function populateDatalists() {
  const originList = document.getElementById("origin-list");
  const destList = document.getElementById("destination-list");
  DEFAULT_AIRPORTS.forEach(a => {
    const opt = document.createElement("option");
    opt.value = `${a.iata} - ${a.cidade}`;
    originList.appendChild(opt);
    destList.appendChild(opt.cloneNode(true));
  });
}

async function buscar(e) {
  if (e) e.preventDefault();

  const origin = document.getElementById("origin").value.trim().split(" - ")[0] || "GRU";
  const destination = document.getElementById("destination").value.trim().split(" - ")[0] || "MIA";
  const depDate = document.getElementById("departure").value;
  const retDate = document.getElementById("return").value;

  const btn = document.getElementById("search-btn");
  const container = document.getElementById("results");

  btn.disabled = true;
  btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Buscando...`;
  container.innerHTML = `<div class="text-center py-12 text-gray-500">Conectando via proxy...</div>`;

  try {
    let params = `engine=google_flights&departure_id=${origin}&arrival_id=${destination}&outbound_date=${depDate}&currency=BRL&hl=pt-BR&gl=BR&api_key=${SERPAPI_KEY}`;
    if (retDate) params += `&return_date=${retDate}`;

    // Usando proxy público para contornar CORS
    const proxyUrl = `https://corsproxy.io/?` + encodeURIComponent(`https://serpapi.com/search.json?${params}`);

    const response = await fetch(proxyUrl);
    const data = await response.json();

    if (data.error) throw new Error(data.error);

    document.getElementById("header").innerHTML = `
      Voos de <span class="text-emerald-600">${origin}</span> → <span class="text-emerald-600">${destination}</span>
    `;

    container.innerHTML = "";

    const flights = data.best_flights || data.flights || [];

    if (flights.length === 0) {
      container.innerHTML = `<div class="text-center py-16 text-orange-600">Nenhum voo encontrado.</div>`;
      return;
    }

    // (mesmo loop de exibição de cards que usamos antes)
    flights.forEach(flight => {
      const price = flight.price || "—";
      const airline = flight.airline || "Companhia";
      const depTime = flight.departure_time || "—";
      const arrTime = flight.arrival_time || "—";
      const duration = flight.duration || "—";
      const stops = flight.stops !== undefined ? (flight.stops === 0 ? "Direto" : flight.stops + " escala(s)") : "—";

      const kiwiLink = `https://www.kiwi.com/br/search/results/${origin}-${destination}/${depDate.replace(/-/g,'')}/${retDate ? retDate.replace(/-/g,'') : ''}`;

      container.innerHTML += `
        <div class="card-hover bg-white border border-orange-100 rounded-3xl p-8 grid grid-cols-12 items-center gap-8 shadow-md">
          <div class="col-span-3 flex items-center gap-4">
            <span class="text-5xl">✈️</span>
            <div>
              <div class="font-bold text-2xl">${airline}</div>
            </div>
          </div>
          <div class="col-span-4 flex justify-between text-2xl font-medium">
            <div>${depTime}</div>
            <div class="text-center text-emerald-500">${duration}<br><span class="text-sm">${stops}</span></div>
            <div>${arrTime}</div>
          </div>
          <div class="col-span-2 text-center">
            <div class="text-4xl font-bold text-emerald-600">R$ ${price}</div>
          </div>
          <div class="col-span-3 flex flex-col gap-3">
            <a href="${kiwiLink}" target="_blank" class="bg-orange-500 hover:bg-orange-600 text-white text-center py-4 rounded-3xl font-semibold">
              Comprar no Kiwi.com
            </a>
            <button onclick="enviarAlerta()" class="border-2 border-emerald-500 text-emerald-600 py-4 rounded-3xl font-semibold">
              Alerta WhatsApp
            </button>
          </div>
        </div>`;
    });

  } catch (error) {
    container.innerHTML = `<div class="text-center py-12 text-red-600">
      Erro: ${error.message}<br><br>
      O proxy público pode estar instável. Tente novamente ou use a opção Kiwi.com.
    </div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<i class="fa-solid fa-magnifying-glass"></i> BUSCAR`;
  }
}

function enviarAlerta() {
  window.open("https://wa.me/5514998370223?text=🚨 Alerta VooFácil - Quero alerta de preço!", "_blank");
}

window.onload = () => {
  populateDatalists();
};
</script>
</body>
</html>

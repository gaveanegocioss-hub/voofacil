<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VooFácil - Amadeus API (06/04/2026)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; }
    h1, h2 { font-family: 'Playfair Display', serif; }
    .card-hover:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="bg-gradient-to-b from-yellow-50 to-white min-h-screen">
<div class="max-w-7xl mx-auto px-6 py-8">
  <div class="flex items-center justify-between mb-10">
    <div class="flex items-center gap-3">
      <div class="text-4xl">✈️</div>
      <h1 class="text-5xl font-bold text-orange-500">VooFácil 
        <span class="text-sm font-normal text-emerald-600">(Amadeus API - Teste)</span>
      </h1>
    </div>
  </div>

  <!-- FORMULÁRIO -->
  <form onsubmit="buscar(event)" class="bg-white shadow-xl rounded-3xl p-8 grid grid-cols-1 md:grid-cols-12 gap-6 mb-12">
    <div class="md:col-span-3">
      <label class="block text-xs font-medium text-gray-500 mb-1">DE ONDE?</label>
      <input id="origin" list="origin-list" type="text" value="GRU" placeholder="GRU, IOS, VCP..." class="w-full px-6 py-5 border-2 border-orange-200 rounded-3xl text-lg focus:border-orange-500 outline-none">
      <datalist id="origin-list"></datalist>
    </div>
    <div class="md:col-span-3">
      <label class="block text-xs font-medium text-gray-500 mb-1">PARA ONDE?</label>
      <input id="destination" list="destination-list" type="text" value="FCO" placeholder="FCO, MCO, IOS..." class="w-full px-6 py-5 border-2 border-orange-200 rounded-3xl text-lg focus:border-orange-500 outline-none">
      <datalist id="destination-list"></datalist>
    </div>
    <div class="md:col-span-2">
      <label class="block text-xs font-medium text-gray-500 mb-1">IDA</label>
      <input type="date" id="departure" value="2026-04-15" class="w-full px-6 py-5 border-2 border-emerald-200 rounded-3xl">
    </div>
    <div class="md:col-span-2">
      <label class="block text-xs font-medium text-gray-500 mb-1">VOLTA</label>
      <input type="date" id="return" value="2026-04-22" class="w-full px-6 py-5 border-2 border-emerald-200 rounded-3xl">
    </div>
    <div class="md:col-span-2 flex items-end">
      <button type="submit" id="search-btn" class="w-full h-14 bg-orange-500 hover:bg-orange-600 text-white font-semibold text-xl rounded-3xl flex items-center justify-center gap-3 transition-all">
        <i class="fa-solid fa-magnifying-glass"></i> BUSCAR
      </button>
    </div>
  </form>

  <div id="header" class="text-3xl font-bold text-orange-600 mb-6"></div>
  <div id="results" class="space-y-8"></div>
</div>

<script>
// === SUAS CREDENCIAIS AMADEUS (TESTE) ===
const AMADEUS_API_KEY = "hW1z4VRJoMouT60oHxnntL0lpzuqAMd2";
const AMADEUS_API_SECRET = "WuS1A0xkVCN60Wnt";

const BASE_URL = "https://test.api.amadeus.com";

// === LISTA ATUALIZADA COM ILHÉUS (IOS) ===
const DEFAULT_AIRPORTS = [
  // === BRASIL ===
  {iata:"GRU", cidade:"São Paulo (Guarulhos)"}, 
  {iata:"CGH", cidade:"São Paulo (Congonhas)"},
  {iata:"GIG", cidade:"Rio de Janeiro (Galeão)"}, 
  {iata:"SDU", cidade:"Rio de Janeiro (Santos Dumont)"},
  {iata:"VCP", cidade:"Campinas (Viracopos)"},
  {iata:"CNF", cidade:"Belo Horizonte (Confins)"}, 
  {iata:"PLU", cidade:"Belo Horizonte (Pampulha)"},
  {iata:"BSB", cidade:"Brasília"}, 
  {iata:"SSA", cidade:"Salvador"},
  {iata:"FOR", cidade:"Fortaleza"}, 
  {iata:"REC", cidade:"Recife"},
  {iata:"POA", cidade:"Porto Alegre"}, 
  {iata:"CWB", cidade:"Curitiba"},
  {iata:"FLN", cidade:"Florianópolis"}, 
  {iata:"NAT", cidade:"Natal"},
  {iata:"MAO", cidade:"Manaus"}, 
  {iata:"BEL", cidade:"Belém"},

  // Interior de SP e região
  {iata:"SJP", cidade:"São José do Rio Preto"}, 
  {iata:"RAO", cidade:"Ribeirão Preto"},
  {iata:"JTC", cidade:"Bauru"}, 

  // Bahia e Nordeste
  {iata:"IOS", cidade:"Ilhéus"}, 
  {iata:"BPS", cidade:"Porto Seguro"},
  {iata:"AJU", cidade:"Aracaju"}, 
  {iata:"MCZ", cidade:"Maceió"},
  {iata:"JPA", cidade:"João Pessoa"},

  // Outros importantes
  {iata:"VIX", cidade:"Vitória"}, 
  {iata:"GYN", cidade:"Goiânia"},
  {iata:"CGR", cidade:"Campo Grande"}, 
  {iata:"UDI", cidade:"Uberlândia"},
  {iata:"THE", cidade:"Teresina"}, 
  {iata:"SLZ", cidade:"São Luís"},
  {iata:"CGB", cidade:"Cuiabá"},

  // === INTERNACIONAL ===
  {iata:"FCO", cidade:"Roma"}, 
  {iata:"LIS", cidade:"Lisboa"},
  {iata:"MXP", cidade:"Milão"}, 
  {iata:"LUX", cidade:"Luxemburgo"},
  {iata:"CDG", cidade:"Paris"}, 
  {iata:"LHR", cidade:"Londres"},
  {iata:"MAD", cidade:"Madrid"}, 
  {iata:"AMS", cidade:"Amsterdã"},
  {iata:"EZE", cidade:"Buenos Aires"},
  {iata:"SCL", cidade:"Santiago (Chile)"},
  {iata:"MCO", cidade:"Orlando"}, 
  {iata:"FLL", cidade:"Fort Lauderdale"},
  {iata:"MIA", cidade:"Miami"},
  {iata:"JFK", cidade:"Nova York"}, 
  {iata:"EWR", cidade:"Newark / New Jersey"},
  {iata:"LIM", cidade:"Lima"}
];

let accessToken = null;

async function getAccessToken() {
  const response = await fetch(`${BASE_URL}/v1/security/oauth2/token`, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      grant_type: "client_credentials",
      client_id: AMADEUS_API_KEY,
      client_secret: AMADEUS_API_SECRET
    })
  });

  if (!response.ok) throw new Error("Falha ao obter token da Amadeus");
  const data = await response.json();
  accessToken = data.access_token;
  return accessToken;
}

function populateDatalists() {
  const originList = document.getElementById("origin-list");
  const destList = document.getElementById("destination-list");
  DEFAULT_AIRPORTS.forEach(a => {
    const opt = document.createElement("option");
    opt.value = `${a.iata} - ${a.cidade}`;
    originList.appendChild(opt);
    destList.appendChild(opt.cloneNode(true));
  });
}

async function buscar(e) {
  if (e) e.preventDefault();

  const originInput = document.getElementById("origin").value.trim().split(" - ")[0] || "GRU";
  const destinationInput = document.getElementById("destination").value.trim().split(" - ")[0] || "FCO";
  const depDate = document.getElementById("departure").value;
  const retDate = document.getElementById("return").value;

  const btn = document.getElementById("search-btn");
  const container = document.getElementById("results");

  btn.disabled = true;
  btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Buscando na Amadeus...`;
  container.innerHTML = `<div class="text-center py-12 text-gray-500">Conectando à Amadeus API...</div>`;

  try {
    if (!accessToken) await getAccessToken();

    let url = `${BASE_URL}/v2/shopping/flight-offers?originLocationCode=${originInput}&destinationLocationCode=${destinationInput}&departureDate=${depDate}&adults=1&max=10&currencyCode=BRL`;

    if (retDate) url += `&returnDate=${retDate}`;

    const response = await fetch(url, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });

    if (!response.ok) throw new Error(`Erro da Amadeus: ${response.status}`);

    const data = await response.json();
    const flights = data.data || [];

    document.getElementById("header").innerHTML = `
      Voos reais de <span class="text-emerald-600">${originInput}</span> 
      para <span class="text-emerald-600">${destinationInput}</span> 
      <span class="text-xl text-gray-500 ml-4">${depDate}${retDate ? ' ↔ ' + retDate : ''}</span>
    `;

    container.innerHTML = "";

    if (flights.length === 0) {
      container.innerHTML = `<div class="text-center py-12 text-orange-600">Nenhum voo encontrado para esta rota/data na Amadeus (ambiente de teste).<br><br>Tente rotas como GRU-IOS, IOS-GRU, GRU-MCO ou VCP-FCO.</div>`;
      return;
    }

    flights.forEach(offer => {
      const price = offer.price?.total || "N/A";
      const currency = offer.price?.currency || "BRL";
      const itinerary = offer.itineraries[0] || {};
      const segments = itinerary.segments || [];
      const firstSegment = segments[0] || {};
      const lastSegment = segments[segments.length - 1] || {};

      const depTime = firstSegment.departure?.at ? firstSegment.departure.at.substring(11,16) : "--:--";
      const arrTime = lastSegment.arrival?.at ? lastSegment.arrival.at.substring(11,16) : "--:--";
      const duration = itinerary.duration ? itinerary.duration.replace("PT", "").replace("H", "h ").replace("M", "min") : "N/A";
      const stops = segments.length > 1 ? `${segments.length - 1} escala(s)` : "Direto";

      container.innerHTML += `
        <div class="card-hover bg-white border border-orange-100 rounded-3xl p-8 grid grid-cols-12 items-center gap-8 shadow-md">
          <div class="col-span-2 flex items-center gap-4">
            <span class="text-5xl">✈️</span>
            <div>
              <div class="font-bold text-2xl">${offer.validatingAirlineCodes ? offer.validatingAirlineCodes[0] : 'Companhia'}</div>
            </div>
          </div>
          <div class="col-span-4 flex justify-between text-2xl font-medium">
            <div>${depTime}</div>
            <div class="text-center text-emerald-500">${duration}<br><span class="text-sm">${stops}</span></div>
            <div>${arrTime}</div>
          </div>
          <div class="col-span-3 text-center">
            <div class="text-5xl font-bold text-emerald-600">R$ ${parseFloat(price).toFixed(0)}</div>
            <div class="text-sm text-gray-500">${currency}</div>
          </div>
          <div class="col-span-3 flex flex-col gap-4">
            <a href="https://www.kiwi.com/br/search/results/${originInput}-${destinationInput}/${depDate}/${retDate || ''}" 
               target="_blank" 
               class="bg-orange-500 text-white text-center py-5 rounded-3xl font-semibold text-lg hover:bg-orange-600 transition">
              Ver no Kiwi.com
            </a>
            <button onclick="enviarAlerta()" class="border-2 border-emerald-500 text-emerald-600 py-5 rounded-3xl font-semibold hover:bg-emerald-50 transition">
              Alerta WhatsApp
            </button>
          </div>
        </div>`;
    });

  } catch (error) {
    console.error(error);
    container.innerHTML = `<div class="text-center py-12 text-red-600">Erro ao buscar voos: ${error.message}<br><br>Tente novamente ou escolha outra rota.</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<i class="fa-solid fa-magnifying-glass"></i> BUSCAR`;
  }
}

function enviarAlerta() {
  window.open("https://wa.me/5514998370223?text=🚨 Alerta VooFácil - Quero alerta de preço!", "_blank");
}

window.onload = () => {
  populateDatalists();
  buscar(null);
};
</script>
</body>
</html>

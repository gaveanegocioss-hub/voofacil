<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VooFácil - Busca de Voos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; }
    h1, h2 { font-family: 'Playfair Display', serif; }
    .card-hover:hover { transform: translateY(-6px); transition: all 0.3s; }
  </style>
</head>
<body class="bg-gradient-to-b from-yellow-50 to-white min-h-screen">
<div class="max-w-7xl mx-auto px-6 py-8">
  <!-- Cabeçalho -->
  <div class="flex items-center gap-3 mb-8">
    <div class="text-5xl">✈️</div>
    <h1 class="text-5xl font-bold text-orange-500">VooFácil</h1>
    <span class="text-sm font-normal text-emerald-600 mt-3">(Modo Temporário - Preços Simulados)</span>
  </div>

  <!-- Aviso -->
  <div class="bg-amber-100 border border-amber-300 text-amber-800 px-6 py-4 rounded-2xl mb-8 text-sm flex items-center gap-3">
    <i class="fa-solid fa-triangle-exclamation text-xl"></i>
    <div>
      <strong>Modo Temporário:</strong> Preços são simulados e variam conforme a rota. 
      Quando você criar sua chave Kiwi.com, trocamos para dados reais.
    </div>
  </div>

  <!-- Formulário -->
  <form onsubmit="buscar(event)" class="bg-white shadow-xl rounded-3xl p-8 grid grid-cols-1 md:grid-cols-12 gap-6 mb-12">
    <div class="md:col-span-3">
      <label class="block text-xs font-medium text-gray-500 mb-1">DE ONDE?</label>
      <input id="origin" list="origin-list" type="text" value="GRU" class="w-full px-6 py-5 border-2 border-orange-200 rounded-3xl text-lg focus:border-orange-500 outline-none">
      <datalist id="origin-list"></datalist>
    </div>
    <div class="md:col-span-3">
      <label class="block text-xs font-medium text-gray-500 mb-1">PARA ONDE?</label>
      <input id="destination" list="destination-list" type="text" value="FCO" class="w-full px-6 py-5 border-2 border-orange-200 rounded-3xl text-lg focus:border-orange-500 outline-none">
      <datalist id="destination-list"></datalist>
    </div>
    <div class="md:col-span-2">
      <label class="block text-xs font-medium text-gray-500 mb-1">IDA</label>
      <input type="date" id="departure" value="2026-04-15" class="w-full px-6 py-5 border-2 border-emerald-200 rounded-3xl">
    </div>
    <div class="md:col-span-2">
      <label class="block text-xs font-medium text-gray-500 mb-1">VOLTA</label>
      <input type="date" id="return" value="2026-04-22" class="w-full px-6 py-5 border-2 border-emerald-200 rounded-3xl">
    </div>
    <div class="md:col-span-2 flex items-end">
      <button type="submit" id="search-btn" 
              class="w-full h-14 bg-orange-500 hover:bg-orange-600 text-white font-semibold text-xl rounded-3xl flex items-center justify-center gap-3 transition-all">
        <i class="fa-solid fa-magnifying-glass"></i> BUSCAR
      </button>
    </div>
  </form>

  <div id="header" class="text-3xl font-bold text-orange-600 mb-6"></div>
  <div id="results" class="space-y-8"></div>
</div>

<script>
// Lista completa de aeroportos
const DEFAULT_AIRPORTS = [
  {iata:"GRU", cidade:"São Paulo (Guarulhos)"}, {iata:"CGH", cidade:"São Paulo (Congonhas)"},
  {iata:"GIG", cidade:"Rio de Janeiro"}, {iata:"VCP", cidade:"Campinas"},
  {iata:"CNF", cidade:"Belo Horizonte"}, {iata:"BSB", cidade:"Brasília"},
  {iata:"SSA", cidade:"Salvador"}, {iata:"FOR", cidade:"Fortaleza"},
  {iata:"REC", cidade:"Recife"}, {iata:"IOS", cidade:"Ilhéus"},
  {iata:"BPS", cidade:"Porto Seguro"}, {iata:"SJP", cidade:"São José do Rio Preto"},
  {iata:"RAO", cidade:"Ribeirão Preto"}, {iata:"JTC", cidade:"Bauru"},
  {iata:"FCO", cidade:"Roma"}, {iata:"LIS", cidade:"Lisboa"},
  {iata:"MCO", cidade:"Orlando"}, {iata:"FLL", cidade:"Fort Lauderdale"},
  {iata:"MIA", cidade:"Miami"}, {iata:"JFK", cidade:"Nova York"},
  {iata:"EWR", cidade:"New Jersey"}, {iata:"EZE", cidade:"Buenos Aires"},
  {iata:"SCL", cidade:"Santiago"}
];

function populateDatalists() {
  const originList = document.getElementById("origin-list");
  const destList = document.getElementById("destination-list");
  DEFAULT_AIRPORTS.forEach(a => {
    const opt = document.createElement("option");
    opt.value = `${a.iata} - ${a.cidade}`;
    originList.appendChild(opt);
    destList.appendChild(opt.cloneNode(true));
  });
}

function getPriceByRoute(origin, dest) {
  const route = `${origin}-${dest}`;
  if (["GRU-FCO", "GIG-FCO"].includes(route)) return 5800;
  if (["GRU-MCO", "GIG-MCO"].includes(route)) return 5200;
  if (["GRU-MIA", "GIG-MIA"].includes(route)) return 4600;
  if (["GRU-LIS"].includes(route)) return 5400;
  if (["GRU-EZE"].includes(route)) return 2100;
  return 3800;
}

function buscar(e) {
  if (e) e.preventDefault();

  const origin = document.getElementById("origin").value.trim().split(" - ")[0] || "GRU";
  const dest = document.getElementById("destination").value.trim().split(" - ")[0] || "FCO";
  const depDate = document.getElementById("departure").value;
  const retDate = document.getElementById("return").value;

  const btn = document.getElementById("search-btn");
  const container = document.getElementById("results");

  btn.disabled = true;
  btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> BUSCANDO...`;

  setTimeout(() => {
    document.getElementById("header").innerHTML = `
      Voos de <span class="text-emerald-600">${origin}</span> → <span class="text-emerald-600">${dest}</span>
      <span class="text-xl text-gray-500 ml-4">${depDate} ${retDate ? '↔ ' + retDate : ''}</span>
    `;

    container.innerHTML = "";

    const companies = ["LATAM", "GOL", "TAP Air Portugal", "Emirates", "Iberia", "Azul", "American Airlines", "British Airways"];
    const basePrice = getPriceByRoute(origin, dest);

    for (let i = 0; i < 8; i++) {
      const variation = Math.floor(Math.random() * 950) - 450;
      const price = Math.max(1800, basePrice + variation);
      const airline = companies[i % companies.length];
      const depTime = ["22:40", "23:55", "18:30", "01:15", "20:50", "19:10", "06:45", "14:20"][i % 8];
      const arrTime = ["07:55", "13:10", "08:45", "19:30", "14:20", "12:35", "19:50", "22:10"][i % 8];
      const duration = ["13h 15min", "13h 45min", "14h 20min", "18h 10min", "15h 30min", "12h 55min", "16h 05min", "14h 50min"][i % 8];
      const stops = i % 3 === 0 ? "Direto" : (i % 2 === 0 ? "1 escala" : "2 escalas");

      const kiwiLink = `https://www.kiwi.com/br/search/results/${origin}-${dest}/${depDate.replace(/-/g,'')}/${retDate ? retDate.replace(/-/g,'') : ''}`;

      container.innerHTML += `
        <div class="card-hover bg-white border border-orange-100 rounded-3xl p-8 grid grid-cols-12 items-center gap-8 shadow-md">
          <div class="col-span-3 flex items-center gap-4">
            <span class="text-5xl">✈️</span>
            <div>
              <div class="font-bold text-2xl">${airline}</div>
              <div class="text-sm text-gray-500">Companhia</div>
            </div>
          </div>
          <div class="col-span-4 flex justify-between text-2xl font-medium">
            <div>${depTime}</div>
            <div class="text-center text-emerald-500">${duration}<br><span class="text-sm">${stops}</span></div>
            <div>${arrTime}</div>
          </div>
          <div class="col-span-2 text-center">
            <div class="text-4xl font-bold text-emerald-600">R$ ${price}</div>
            <div class="text-xs text-gray-500">por pessoa</div>
          </div>
          <div class="col-span-3 flex flex-col gap-3">
            <a href="${kiwiLink}" target="_blank" 
               class="bg-orange-500 hover:bg-orange-600 text-white text-center py-5 rounded-3xl font-semibold text-lg transition">
              Comprar no Kiwi.com
            </a>
            <button onclick="enviarAlerta()" 
                    class="border-2 border-emerald-500 text-emerald-600 py-5 rounded-3xl font-semibold hover:bg-emerald-50 transition">
              Alerta WhatsApp
            </button>
          </div>
        </div>`;
    }

    btn.disabled = false;
    btn.innerHTML = `<i class="fa-solid fa-magnifying-glass"></i> BUSCAR`;
  }, 900);
}

function enviarAlerta() {
  window.open("https://wa.me/5514998370223?text=🚨 Alerta VooFácil - Quero alerta de preço!", "_blank");
}

window.onload = () => {
  populateDatalists();
  buscar(null);
};
</script>
</body>
</html>
